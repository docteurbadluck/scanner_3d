name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Record pipeline start time
        id: timing
        run: echo "start_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y g++ make

      # ── server ─────────────────────────────────────

      - name: run server
        run: make server-background
      
      - name: wait for server
        run: |
          for i in $(seq 1 10); do
            nc -z localhost 8080 && exit 0
            sleep 1
          done
          echo "Server failed to start" && exit 1

      - name: server test
        run: make server-test


      # ── Collect Accelerate metrics ─────────────────────────────────────

      - name: Collect Accelerate metrics
        if: always()
        env:
          COMMIT_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          PIPELINE_START: ${{ steps.timing.outputs.start_time }}
          JOB_STATUS: ${{ job.status }}
        run: python3 metrics/collect_run_metrics.py

      - name: Upload Accelerate metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accelerate-metrics-${{ github.run_number }}
          path: metrics/run_metrics.json
          retention-days: 90

      - name: Aggregate Accelerate metrics
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 metrics/aggregate.py

      - name: Commit updated summary
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metrics/summary.json computer/www/data/productivity.json
          git diff --cached --quiet || git commit -m "ci: update metrics summary [skip ci]"
          git push