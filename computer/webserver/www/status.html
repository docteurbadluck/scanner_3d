<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>status</title>
  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, sans-serif; }
    body { display: grid; place-items: center; background: #0f172a; color: #e2e8f0; }
    .card {
      padding: 2.5rem 3rem;
      border-radius: 1.25rem;
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
      text-align: center;
    }
    h1 { margin: 0 0 0.5rem; font-size: 2.25rem; line-height: 1.1; }
    p  { margin: 0 0 1.2rem; opacity: 0.85; }
    .link { display: inline-block; padding: 0.6rem 1.6rem; background: #ffd700; color: #1a1a2e; font-weight: bold; text-decoration: none; border-radius: 30px; transition: transform 0.15s; }
    .link:hover { transform: scale(1.06); }
  </style>
</head>
<body>
  <div class="card">
    <h1>status</h1>
    <p>Welcome! Your server is up.</p>
  </div>
</body>
</html>
