<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Productivity</title>
  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, sans-serif; }
    body { display: grid; place-items: center; background: #0f172a; color: #e2e8f0; }
    .card {
      padding: 2.5rem 3rem;
      border-radius: 1.25rem;
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
      text-align: center;
      min-width: 340px;
    }
    h1 { margin: 0 0 0.5rem; font-size: 2.25rem; line-height: 1.1; }
    nav { margin-bottom: 1.5rem; }
    nav a { color: #ffd700; text-decoration: none; margin: 0 0.5rem; font-size: 0.85rem; opacity: 0.8; }
    nav a:hover { opacity: 1; }
    #status { margin: 0 0 1rem; font-size: 0.85rem; opacity: 0.6; min-height: 1.2em; }
    .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
    .metric { background: rgba(255,255,255,0.05); border-radius: 0.75rem; padding: 1rem; }
    .metric .label { font-size: 0.75rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
    .metric .value { font-size: 1.6rem; font-weight: bold; color: #ffd700; }
    .meta { margin-top: 1.2rem; font-size: 0.72rem; opacity: 0.4; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Productivity</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="metrics.html">Metrics</a>
      <a href="status.html">Status</a>
    </nav>
    <p id="status"></p>
    <div class="metrics-grid">
      <div class="metric">
        <div class="label">Lead Time</div>
        <div class="value" id="lead-time">—</div>
      </div>
      <div class="metric">
        <div class="label">Deploy Frequency</div>
        <div class="value" id="deploy-freq">—</div>
      </div>
      <div class="metric">
        <div class="label">Time to Restore</div>
        <div class="value" id="ttr">—</div>
      </div>
      <div class="metric">
        <div class="label">Change Failure Rate</div>
        <div class="value" id="cfr">—</div>
      </div>
      <div class="metric">
        <div class="label">Test Coverage Computer</div>
        <div class="value" id="coverage">—</div>
      </div>
      <div class="metric">
        <div class="label">Test Coverage Pico</div>
        <div class="value" id="coverage-pico">—</div>
      </div>
    </div>
    <div class="meta">Updated: <span id="last-updated">—</span></div>
  </div>

  <script>
    function init() {
      fetchData('./data/productivity.json').then(render).catch(showError);
      fetchData('./data/coverage.json').then(renderCoverage).catch(() => {});
      fetchData('./data/pico_coverage.json').then(renderPicoCoverage).catch(() => {});
      scheduleRefresh();
    }

    function fetchData(url) { return fetch(url).then(r => r.json()); }

    function render(data) {
      setValue('lead-time',    fmt(data.lead_time_avg_minutes,        'min'));
      setValue('deploy-freq',  fmt(data.deployment_frequency_per_day, '/ day'));
      setValue('ttr',          fmt(data.time_to_restore_avg_minutes,  'min'));
      setValue('cfr',          fmt(data.change_failure_rate_pct,      '%'));
      setValue('last-updated', data.computed_at ?? 'n/a');
      setValue('status', '');
    }

    function setValue(id, val)   { document.getElementById(id).textContent = val ?? 'n/a'; }
    function fmt(val, unit)      { return val != null ? val + '\u00a0' + unit : 'n/a'; }
    function renderCoverage(data) {
      const val = data?.totals?.percent_covered;
      setValue('coverage', val != null ? val.toFixed(1) + '\u00a0%' : 'n/a');
    }

    function renderPicoCoverage(data) {
      const val = data?.totals?.percent_covered;
      setValue('coverage-pico', val != null ? val.toFixed(1) + '\u00a0%' : 'n/a');
    }

    function scheduleRefresh()   { setInterval(refresh, 60_000); }
    function refresh() {
      fetchData('./data/productivity.json').then(render).catch(() => {});
      fetchData('./data/coverage.json').then(renderCoverage).catch(() => {});
      fetchData('./data/pico_coverage.json').then(renderPicoCoverage).catch(() => {});
    }
    function showError()         { setValue('status', 'No data \u2014 run aggregate.py first.'); }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
