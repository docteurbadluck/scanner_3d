<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Metrics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style type="text/tailwindcss">
    .card         { @apply py-10 px-12 rounded-[1.25rem] bg-slate-800/60 backdrop-blur text-center min-w-[340px] shadow-2xl; }
    .nav-link     { @apply text-yellow-400 no-underline mx-2 text-sm opacity-80 hover:opacity-100; }
    .metric-card  { @apply bg-white/5 rounded-xl p-4; }
    .metric-label { @apply text-xs opacity-60 uppercase tracking-[0.05em] mb-1; }
    .metric-value { @apply text-[1.6rem] font-bold text-yellow-400; }
    .meta         { @apply mt-5 text-[0.72rem] opacity-40; }
  </style>
</head>
<body class="min-h-screen bg-slate-900 text-slate-200 flex items-center justify-center font-sans">
  <div class="card">
    <h1 class="text-[2.25rem] font-bold leading-tight mb-2">Metrics</h1>
    <nav class="mb-6">
      <a class="nav-link" href="../">Home</a>
      <a class="nav-link" href="../productivity/">Productivity</a>
      <a class="nav-link" href="../status/">Status</a>
    </nav>
    <p id="status-msg" class="text-sm opacity-60 min-h-[1.2em] mb-4"></p>
    <metrics-grid id="metrics-grid"></metrics-grid>
    <div class="meta">Refreshes every 30 s</div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
