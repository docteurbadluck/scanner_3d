<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>status</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style type="text/tailwindcss">
    .badge         { @apply text-xs font-bold px-3 py-1 rounded-full min-w-[90px] text-center; }
    .badge-ok      { @apply bg-green-600 text-white; }
    .badge-warn    { @apply bg-yellow-600 text-white; }
    .badge-err     { @apply bg-red-600 text-white; }
    .badge-unknown { @apply bg-slate-600 text-slate-300; }
    .ping-btn      { @apply w-full py-2.5 px-6 bg-yellow-400 text-slate-900 font-bold border-0 rounded-full cursor-pointer text-base transition-transform duration-150 enabled:hover:scale-105 disabled:opacity-45 disabled:cursor-not-allowed; }
    .log-line      { @apply whitespace-pre-wrap break-all m-0; }
  </style>
</head>
<body class="min-h-screen bg-slate-900 text-slate-200 grid place-items-center font-sans">
  <div class="p-10 rounded-2xl bg-slate-800/60 backdrop-blur-md shadow-2xl text-center min-w-80">
    <h1 class="text-4xl mb-6">status</h1>

    <status-section id="status-section"></status-section>

    <ping-section   id="ping-section"></ping-section>

    <log-section    id="log-section"></log-section>

  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
