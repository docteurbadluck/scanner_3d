<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>status</title>
  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, sans-serif; }
    body { display: grid; place-items: center; background: #0f172a; color: #e2e8f0; }
    .card {
      padding: 2.5rem 3rem;
      border-radius: 1.25rem;
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
      text-align: center;
      min-width: 320px;
    }
    h1 { margin: 0 0 1.5rem; font-size: 2.25rem; line-height: 1.1; }
    .rows { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem; }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 1.5rem; }
    .label { opacity: 0.7; font-size: 0.95rem; }
    .badge {
      font-size: 0.8rem; font-weight: bold; padding: 0.25rem 0.75rem;
      border-radius: 999px; min-width: 90px; text-align: center;
    }
    .badge-ok      { background: #16a34a; color: #fff; }
    .badge-warn    { background: #ca8a04; color: #fff; }
    .badge-err     { background: #dc2626; color: #fff; }
    .badge-unknown { background: #475569; color: #cbd5e1; }
    .ping-btn {
      width: 100%; padding: 0.65rem 1.6rem; background: #ffd700; color: #1a1a2e;
      font-weight: bold; border: none; border-radius: 30px; cursor: pointer;
      font-size: 1rem; transition: transform 0.15s;
    }
    .ping-btn:hover:not(:disabled) { transform: scale(1.04); }
    .ping-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .ping-result { margin-top: 0.6rem; font-size: 0.85rem; min-height: 1.1rem; opacity: 0.8; }
    .ping-section { margin-top: 0.75rem; }
    .log-panel {
      margin-top: 1.5rem; text-align: left;
      background: rgba(0,0,0,0.3); border-radius: 0.5rem;
      padding: 0.6rem 0.8rem; max-height: 160px; overflow-y: auto;
      font-size: 0.72rem; font-family: monospace; color: #94a3b8;
    }
    .log-panel .log-line { white-space: pre-wrap; word-break: break-all; margin: 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>status</h1>
    <div class="rows">
      <div class="row">
        <span class="label">Pi</span>
        <span id="pi-badge"  class="badge badge-unknown">unknown</span>
      </div>
      <div class="row">
        <span class="label">Pi State</span>
        <span id="state-badge" class="badge badge-unknown">unknown</span>
      </div>
      <div class="row">
        <span class="label">Pico</span>
        <span id="pico-badge" class="badge badge-unknown">unknown</span>
      </div>
    </div>
    <button id="ping-btn" class="ping-btn" disabled>Ping Pi</button>
    <div id="ping-result" class="ping-result"></div>
    <div class="ping-section">
      <button id="ping-pico-btn" class="ping-btn" disabled>Ping Pico</button>
      <div id="ping-pico-result" class="ping-result"></div>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:1rem">
      <button id="clear-log-btn" class="ping-btn" style="width:auto;padding:0.3rem 1rem;font-size:0.8rem">Clear logs</button>
    </div>
    <div id="log-panel" class="log-panel"></div>
  </div>

  <script>
    const piBadge       = document.getElementById('pi-badge');
    const stateBadge    = document.getElementById('state-badge');
    const picoBadge     = document.getElementById('pico-badge');
    const pingBtn       = document.getElementById('ping-btn');
    const pingResult    = document.getElementById('ping-result');
    const pingPicoBtn    = document.getElementById('ping-pico-btn');
    const pingPicoResult = document.getElementById('ping-pico-result');
    const logPanel       = document.getElementById('log-panel');
    const clearLogBtn    = document.getElementById('clear-log-btn');
    const MAX_LOG_LINES  = 20;

    const PING_TIMEOUT_MS = 5000;

    let pingTs          = null;
    let pingTimeout     = null;
    let pingPicoTs      = null;
    let pingPicoTimeout = null;
    let ws              = null;

    function isPingAllowed() {
      const state = stateBadge.textContent;
      return piBadge.textContent === 'connected'
          && state !== 'PROCESSING'
          && state !== 'SENDING';
    }

    function isPingPicoAllowed() {
      return piBadge.textContent === 'connected'
          && picoBadge.textContent === 'LISTENING';
    }

    function cancelPing(msg) {
      clearTimeout(pingTimeout);
      pingTimeout = null;
      pingTs      = null;
      pingResult.textContent = msg;
      pingBtn.disabled = !isPingAllowed();
    }

    function cancelPingPico(msg) {
      clearTimeout(pingPicoTimeout);
      pingPicoTimeout = null;
      pingPicoTs      = null;
      pingPicoResult.textContent = msg;
      pingPicoBtn.disabled = !isPingPicoAllowed();
    }

    function setBadge(el, ok) {
      if (ok === null) { el.className = 'badge badge-unknown'; el.textContent = 'unknown'; return; }
      el.className = ok ? 'badge badge-ok' : 'badge badge-err';
      el.textContent = ok ? 'connected' : 'disconnected';
    }

    function setPicoBadge(state) {
      const cls = { LISTENING: 'badge-ok', INTERPRETING: 'badge-warn', EXECUTING: 'badge-warn' };
      if (state === null) {
        picoBadge.className = 'badge badge-unknown'; picoBadge.textContent = 'unknown';
        pingPicoBtn.disabled = true;
        return;
      }
      picoBadge.className = 'badge ' + (cls[state] ?? 'badge-unknown');
      picoBadge.textContent = state;
      if (pingPicoTimeout === null)
        pingPicoBtn.disabled = !isPingPicoAllowed();
    }

    function setStateBadge(el, state) {
      const cls = { READY: 'badge-ok', PROCESSING: 'badge-warn', SENDING: 'badge-warn' };
      el.className = 'badge ' + (cls[state] ?? 'badge-unknown');
      el.textContent = state ?? 'unknown';
      if (pingTimeout === null)
        pingBtn.disabled = !isPingAllowed();
    }

    function appendLog(raw) {
      const p = document.createElement('p');
      p.className = 'log-line';
      p.textContent = raw;
      logPanel.appendChild(p);
      while (logPanel.children.length > MAX_LOG_LINES)
        logPanel.removeChild(logPanel.firstChild);
      logPanel.scrollTop = logPanel.scrollHeight;
    }

    function onMessage(evt) {
      const data = JSON.parse(evt.data);
      if (data.type === 'debug') { appendLog(data.raw); return; }
      if (data.type === 'pi_connection') {
        setBadge(piBadge, data.connected);
        if (!data.connected) {
          setPicoBadge(null); setStateBadge(stateBadge, null);
          pingPicoBtn.disabled = true;
        }
      }
      if (data.type === 'pico_status') { setPicoBadge(data.state); }
      if (data.type === 'status') {
        setStateBadge(stateBadge, data.state);
      }
      if (data.type === 'state') {
        setStateBadge(stateBadge, data.state);
      }
      if (data.type === 'response' && data.kind === 'PONG' && data.command !== 'PING_PICO') {
        const ms = pingTs !== null ? Date.now() - pingTs : null;
        cancelPing(ms !== null ? `PONG — ${ms} ms` : 'PONG');
      }
      if (data.type === 'response' && data.command === 'PING_PICO') {
        cancelPingPico(data.ms !== undefined ? `PONG — ${data.ms} ms (Pi→Pico)` : 'PONG');
      }
    }

    function connect() {
      ws = new WebSocket(`ws://${location.hostname}:8081`);
      ws.onmessage = onMessage;
      ws.onclose = () => {
        setBadge(piBadge, null);
        setPicoBadge(null);
        pingBtn.disabled = true;
        pingPicoBtn.disabled = true;
        setTimeout(connect, 3000);
      };
    }

    pingBtn.addEventListener('click', () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      pingTs = Date.now();
      pingBtn.disabled = true;
      pingResult.textContent = '…';
      ws.send(JSON.stringify({ type: 'command', command: 'PING' }));
      pingTimeout = setTimeout(() => cancelPing('timeout'), PING_TIMEOUT_MS);
    });

    clearLogBtn.addEventListener('click', () => { logPanel.innerHTML = ''; });

    pingPicoBtn.addEventListener('click', () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      pingPicoTs = Date.now();
      pingPicoBtn.disabled = true;
      pingPicoResult.textContent = '…';
      ws.send(JSON.stringify({ type: 'command', command: 'PING_PICO' }));
      pingPicoTimeout = setTimeout(() => cancelPingPico('timeout'), PING_TIMEOUT_MS);
    });

    connect();
  </script>
</body>
</html>
