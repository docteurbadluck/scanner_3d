<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style type="text/tailwindcss">
    .badge         { @apply text-xs font-bold px-3 py-1 rounded-full min-w-[90px] text-center; }
    .badge-ok      { @apply bg-green-600 text-white; }
    .badge-warn    { @apply bg-yellow-600 text-white; }
    .badge-err     { @apply bg-red-600 text-white; }
    .badge-unknown { @apply bg-slate-600 text-slate-300; }
  </style>
</head>
<body style="margin:0" class="font-sans text-slate-200">
  <page-card title="Scan" page="scan">
    <new-scan-form id="new-scan-form"></new-scan-form>
    <scan-list id="scan-list"></scan-list>
  </page-card>
  <script type="module" src="/js/PageCard.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
